<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>WDW Graph</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100dvh;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    .wrap {
      display: flex;
      width: 100%;
      height: 100dvh;
      overflow: hidden;
    }

    #graph {
      flex: 1 1 auto;
      min-width: 0;
      min-height: 0;
      border-right: 1px solid #ddd;
    }

    #panel {
      width: 340px;
      min-width: 340px;
      height: 100%;
      overflow: auto;
      box-sizing: border-box;
      padding: 12px;
    }

    ul { margin: 8px 0 16px; padding-left: 20px; }
    code { font-size: 12px; }
    .muted { color: #666; font-size: 12px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div id="graph"></div>
    <aside id="panel">
      <h3>Connectivity</h3>
      <div id="stats" class="muted">Loading…</div>
      <h4>Isolated nodes (degree 0)</h4>
      <ul id="isolatedList"></ul>
      <h4>Not in largest component</h4>
      <ul id="disconnectedList"></ul>
    </aside>
  </div>

  <script src="/static/vendor/vis-network.min.js"></script><script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
  <script src="/static/js/graph.js"></script>
</body>
</html>
